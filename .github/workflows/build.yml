name: Build and Release WindowsCleaner

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore WindowsCleaner.sln

    - name: Build
      run: msbuild WindowsCleaner.sln /p:Configuration=Release /p:Platform=x64

    - name: Collect build output
      run: |
        mkdir publish
        Get-ChildItem -Path . -Recurse -Include *.exe,*.dll | Where-Object { $_.FullName -like "*Release*" } | Copy-Item -Destination publish
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindowsCleaner-artifact
        path: ./publish/
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Create version tag
      id: create_tag
      run: |
        VERSION="v1.0.${{ github.run_number }}"
        git tag $VERSION
        git push origin $VERSION
        echo "tag=${VERSION}" >> $GITHUB_OUTPUT

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: WindowsCleaner-artifact
        path: ./publish
        run-id: ${{ github.run_id }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag }}
        files: ./publish/**
