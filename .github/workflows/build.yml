name: Build and Release WindowsCleaner

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore WindowsCleaner.sln

    - name: Build WindowsCleaner
      run: msbuild WindowsCleaner.sln /p:Configuration=Release /p:Platform=x64 /p:OutputPath=./publish

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WindowsCleaner-artifact
        path: ./publish/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create a version tag
      id: create_tag
      run: |
        VERSION="v1.0.${{ github.run_number }}"
        git tag $VERSION
        git push origin $VERSION
        echo "tag=${VERSION}" >> $GITHUB_OUTPUT

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: WindowsCleaner-artifact
        path: ./publish

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag }}
        files: ./publish/**
